<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Chat Client - <span id="usernameDisplay">Loading...</span></title>
    <style>
        :root {
            --line-primary: #000000;
            --line-secondary: #666666;
            --line-tertiary: #CCCCCC;
            --line-accent: #FF4500;
            --bg-white: #FFFFFF;
            --success: #22C55E;
            --warning: #F59E0B;
            --danger: #EF4444;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
        }
        
        /* 登录界面 */
        .login-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-box {
            background: var(--bg-white);
            border: 1px solid var(--line-tertiary);
            border-radius: 6px;
            padding: 48px;
            width: 400px;
            text-align: center;
        }
        
        .login-box h1 {
            font-size: 24px;
            margin-bottom: 32px;
            color: var(--line-accent);
        }
        
        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--line-secondary);
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--line-tertiary);
            border-radius: 4px;
            font-size: 16px;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--line-accent);
            border-width: 2px;
        }
        
        .btn {
            background: transparent;
            border: 1px solid var(--line-primary);
            border-radius: 4px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.15s ease;
            margin: 4px;
        }
        
        .btn:hover {
            border-color: var(--line-accent);
            background: rgba(255, 69, 0, 0.05);
        }
        
        .btn-primary {
            background: var(--line-accent);
            color: white;
            border-color: var(--line-accent);
        }
        
        .btn-primary:hover {
            background: #e03e00;
        }
        
        /* 聊天界面 */
        .chat-container {
            display: none;
            width: 100%;
        }
        
        .sidebar {
            width: 280px;
            background: var(--bg-white);
            border-right: 1px solid var(--line-tertiary);
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--line-tertiary);
        }
        
        .sidebar-header h2 {
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .group-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .group-item {
            padding: 16px;
            border-bottom: 1px solid var(--line-light);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .group-item:hover {
            background: rgba(255, 69, 0, 0.05);
        }
        
        .group-item.active {
            background: rgba(255, 69, 0, 0.1);
            border-left: 3px solid var(--line-accent);
        }
        
        .group-item h3 {
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .group-item p {
            font-size: 12px;
            color: var(--line-secondary);
        }
        
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-white);
        }
        
        .chat-header {
            padding: 16px;
            border-bottom: 1px solid var(--line-tertiary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h2 {
            font-size: 18px;
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .status-dot.connected {
            background: var(--success);
            border: 1.5px solid var(--success);
        }
        
        .status-dot.disconnected {
            background: var(--danger);
            border: 1.5px solid var(--danger);
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .message {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 6px;
            max-width: 70%;
        }
        
        .message.mine {
            background: rgba(255, 69, 0, 0.1);
            margin-left: auto;
            border: 1px solid var(--line-accent);
        }
        
        .message.other {
            background: #f5f5f5;
            border: 1px solid var(--line-tertiary);
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
        }
        
        .message-sender {
            font-weight: 600;
            color: var(--line-accent);
        }
        
        .message-time {
            color: var(--line-secondary);
        }
        
        .message-content {
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        
        .chat-input {
            padding: 16px;
            border-top: 1px solid var(--line-tertiary);
            display: flex;
            gap: 12px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--line-tertiary);
            border-radius: 4px;
            font-size: 14px;
        }
        
        .chat-input input:focus {
            outline: none;
            border-color: var(--line-accent);
        }
        
        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--line-secondary);
        }
        
        .user-info {
            padding: 12px;
            background: #f5f5f5;
            border-top: 1px solid var(--line-tertiary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-info button {
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>💬 MQTT Chat</h1>
            <form id="loginForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <div style="margin-top: 24px;">
                    <button type="submit" class="btn btn-primary">Login</button>
                    <button type="button" class="btn" onclick="register()">Register</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 聊天界面 -->
    <div class="chat-container" id="chatContainer">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>👥 Groups</h2>
            </div>
            <div class="group-list" id="groupList">
                <div class="empty-state">Loading groups...</div>
            </div>
            <div class="user-info">
                <span id="currentUser">User</span>
                <button class="btn" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <div class="main-chat">
            <div class="chat-header">
                <h2 id="currentGroup">Select a group</h2>
                <div class="connection-status">
                    <span class="status-dot disconnected" id="mqttStatus"></span>
                    <span id="mqttStatusText">Disconnected</span>
                </div>
            </div>
            
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">Select a group to start chatting</div>
            </div>
            
            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                <button class="btn btn-primary" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:14050';
        let currentUser = null;
        let currentGroupId = null;
        let currentGroupName = null;
        let mqttClient = null;
        let groups = [];

        // 从 cookie 中读取 auth_token
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
        });

        // 检查认证状态（从 cookie 读取）
        function checkAuth() {
            const savedUser = getCookie('mqtt_user');

            if (savedUser) {
                try {
                    currentUser = JSON.parse(decodeURIComponent(savedUser));
                    showChatInterface();
                    loadGroups();
                } catch (e) {
                    // cookie 解析失败，清除无效 cookie
                    document.cookie = 'mqtt_user=; Max-Age=0';
                }
            }
        }

        // 登录（token 现在通过 httpOnly cookie 自动存储）
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/api/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', // 发送 cookies
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    currentUser = { userId: data.userId, username: data.username };
                    // 将用户信息存储在 cookie 中（不存储 token）
                    document.cookie = `mqtt_user=${encodeURIComponent(JSON.stringify(currentUser))}; max-age=${7*24*60*60}; samesite=lax`;
                    showChatInterface();
                    loadGroups();
                } else {
                    alert(data.error || 'Login failed');
                }
            } catch (error) {
                alert('Login error: ' + error.message);
            }
        });

        // 注册
        async function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('Please enter username and password');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/users/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', // 发送 cookies
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    alert('Registration successful! Please login.');
                } else {
                    alert(data.error || 'Registration failed');
                }
            } catch (error) {
                alert('Registration error: ' + error.message);
            }
        }

        // 显示聊天界面
        function showChatInterface() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
            document.getElementById('usernameDisplay').textContent = currentUser.username;
            document.getElementById('currentUser').textContent = currentUser.username;
        }
        
        // 加载群组
        async function loadGroups() {
            try {
                const response = await fetch(`${API_BASE}/api/groups`, {
                    credentials: 'include' // 自动发送 httpOnly cookie
                });
                
                groups = await response.json();
                
                const groupList = document.getElementById('groupList');
                
                if (groups.length === 0) {
                    // 创建默认测试群组
                    await createDefaultGroup();
                    return;
                }
                
                groupList.innerHTML = groups.map(group => `
                    <div class="group-item" onclick="selectGroup('${group.id}', '${group.name}')">
                        <h3>${group.name}</h3>
                        <p>${group.description || 'No description'}</p>
                    </div>
                `).join('');
                
                // 自动选择第一个群组
                if (groups.length > 0) {
                    selectGroup(groups[0].id, groups[0].name);
                }
            } catch (error) {
                console.error('Load groups error:', error);
            }
        }
        
        // 创建默认群组
        async function createDefaultGroup() {
            try {
                const response = await fetch(`${API_BASE}/api/groups`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        name: 'General Chat',
                        description: 'Welcome to the general chat room!'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    loadGroups();
                }
            } catch (error) {
                console.error('Create group error:', error);
            }
        }
        
        // 选择群组
        function selectGroup(groupId, groupName) {
            // 更新UI
            document.querySelectorAll('.group-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            currentGroupId = groupId;
            currentGroupName = groupName;
            document.getElementById('currentGroup').textContent = groupName;
            
            // 加载历史消息
            loadMessages(groupId);
            
            // 连接MQTT
            connectMQTT(groupId);
        }
        
        // 加载历史消息
        async function loadMessages(groupId) {
            try {
                const response = await fetch(`${API_BASE}/api/groups/${groupId}/messages`, {
                    credentials: 'include'
                });
                
                const messages = await response.json();
                renderMessages(messages);
            } catch (error) {
                console.error('Load messages error:', error);
            }
        }
        
        // 渲染消息
        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="empty-state">No messages yet. Start chatting!</div>';
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.sender_id === currentUser.userId ? 'mine' : 'other'}">
                    <div class="message-header">
                        <span class="message-sender">${msg.username || msg.nickname || 'Unknown'}</span>
                        <span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
                    </div>
                    <div class="message-content">${escapeHtml(msg.content)}</div>
                </div>
            `).join('');
            
            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }
        
        // 连接MQTT
        function connectMQTT(groupId) {
            if (mqttClient) {
                mqttClient.end();
            }
            
            const wsUrl = 'ws://localhost:8883/mqtt';
            const topic = `chat/group/${groupId}/message`;
            
            mqttClient = mqtt.connect(wsUrl, {
                clientId: `mqtt_client_${Date.now()}`,
                username: currentUser.username,
                password: token
            });
            
            mqttClient.on('connect', () => {
                console.log('MQTT Connected');
                document.getElementById('mqttStatus').className = 'status-dot connected';
                document.getElementById('mqttStatusText').textContent = 'Connected';
                
                // 订阅群组消息
                mqttClient.subscribe(topic, (err) => {
                    if (!err) {
                        console.log(`Subscribed to ${topic}`);
                    }
                });
            });
            
            mqttClient.on('message', (receivedTopic, message) => {
                if (receivedTopic === topic) {
                    try {
                        const msgData = JSON.parse(message.toString());
                        addMessageToUI(msgData);
                    } catch (e) {
                        console.error('Parse message error:', e);
                    }
                }
            });
            
            mqttClient.on('error', (err) => {
                console.error('MQTT Error:', err);
                document.getElementById('mqttStatus').className = 'status-dot disconnected';
                document.getElementById('mqttStatusText').textContent = 'Error';
            });
            
            mqttClient.on('close', () => {
                console.log('MQTT Disconnected');
                document.getElementById('mqttStatus').className = 'status-dot disconnected';
                document.getElementById('mqttStatusText').textContent = 'Disconnected';
            });
        }
        
        // 添加消息到UI
        function addMessageToUI(msgData) {
            const container = document.getElementById('messagesContainer');
            
            // 检查是否是自己发送的消息
            const isMine = msgData.sender_id === currentUser.userId;
            
            const messageHTML = `
                <div class="message ${isMine ? 'mine' : 'other'}">
                    <div class="message-header">
                        <span class="message-sender">${msgData.username || msgData.nickname || 'Unknown'}</span>
                        <span class="message-time">${new Date(msgData.created_at).toLocaleTimeString()}</span>
                    </div>
                    <div class="message-content">${escapeHtml(msgData.content)}</div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', messageHTML);
            container.scrollTop = container.scrollHeight;
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content) return;
            if (!currentGroupId) {
                alert('Please select a group first');
                return;
            }
            
            const messageData = {
                sender_id: currentUser.userId,
                username: currentUser.username,
                content: content,
                group_id: currentGroupId,
                created_at: new Date().toISOString()
            };
            
            // 通过MQTT发送
            if (mqttClient && mqttClient.connected) {
                const topic = `chat/group/${currentGroupId}/message`;
                mqttClient.publish(topic, JSON.stringify(messageData));
            }
            
            // 同时通过HTTP保存到数据库
            try {
                await fetch(`${API_BASE}/api/groups/${currentGroupId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(messageData)
                });
            } catch (error) {
                console.error('Save message error:', error);
            }
            
            input.value = '';
        }
        
        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // 登出（清除 httpOnly cookie）
        function logout() {
            if (mqttClient) {
                mqttClient.end();
            }

            // 清除 auth_token cookie（服务器设置的是 httpOnly，但客户端可以通过设置 Max-Age=0 来删除同名 cookie）
            document.cookie = 'auth_token=; Max-Age=0';
            document.cookie = 'mqtt_user=; Max-Age=0';

            location.reload();
        }
        
        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
